# Deploy como serviço Docker Swarm (rede projetonet + Traefik), como na v1.
# A imagem é buildada antes via `docker compose build`; aqui só se referencia.
# O deploy é feito pelo scripts/deploy-pull.sh.
services:
  assistente-v2:
    image: assistente-pessoal-v2-assistente-v2:latest
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - MODEL_DEFAULT_ID=${MODEL_DEFAULT_ID}
      - MODEL_STRONG_ID=${MODEL_STRONG_ID}
      - EMBEDDING_MODEL_ID=${EMBEDDING_MODEL_ID}
      - LLM_BUDGET_BRL=${LLM_BUDGET_BRL}
      - USD_BRL_RATE=${USD_BRL_RATE}
      - TIMEZONE=${TIMEZONE}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN:-}
      - BANCO_MCP_TOKEN=${BANCO_MCP_TOKEN:-}
      - PORT=8080
      - VAULT_PATH=/vault
    volumes:
      - /root/assistente-vault:/vault
    networks:
      - projetonet
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.assistente-v2.entrypoints=websecure"
        - "traefik.http.routers.assistente-v2.rule=Host(`assistente.aiexcelencia.com`)"
        - "traefik.http.routers.assistente-v2.service=assistente-v2"
        - "traefik.http.routers.assistente-v2.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.assistente-v2.loadbalancer.passHostHeader=1"
        - "traefik.http.services.assistente-v2.loadbalancer.server.port=8080"

networks:
  projetonet:
    external: true
